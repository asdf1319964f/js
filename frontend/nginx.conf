server {
    listen 80;
    server_name localhost;

    # 直接访问根路径时重定向到登录页
    location = / {
        return 301 /login.html;
    }

    # 明确映射各个路径到对应的HTML文件
    location = /login {
        alias /usr/share/nginx/html/login.html;
    }

    location = /favorites {
        alias /usr/share/nginx/html/favorites.html;
    }

    location = /tags {
        alias /usr/share/nginx/html/tags.html;
    }

    location = /settings {
        alias /usr/share/nginx/html/settings.html;
    }

    # 静态资源处理
    location / {
        root /usr/share/nginx/html;
        index login.html;
        try_files $uri $uri/ /login.html;
    }

    # API代理
    location /api {
        proxy_pass http://backend:3077;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
