<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - Telegram收藏夹</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f5f5f5;
      padding-top: 56px;
    }
    .navbar {
      background-color: #0088cc;
    }
    .navbar-brand, .nav-link {
      color: white !important;
    }
    .card {
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    .card-body {
      padding: 1.25rem;
    }
    .favorite-item {
      border-left: 4px solid #0088cc;
    }
    .tag-badge {
      background-color: #e9ecef;
      color: #495057;
      margin-right: 5px;
      cursor: pointer;
    }
    .tag-badge:hover {
      background-color: #0088cc;
      color: white;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
    }
    .spinner-border {
      width: 3rem;
      height: 3rem;
    }
    .empty-state {
      text-align: center;
      padding: 50px 0;
    }
    .empty-state i {
      font-size: 5rem;
      color: #dee2e6;
    }
    .empty-state h3 {
      margin-top: 20px;
      color: #6c757d;
    }
    .empty-state p {
      color: #adb5bd;
    }
    .account-selector {
      max-width: 300px;
      margin: 0 auto 20px;
    }
    .message-content {
      white-space: pre-line;
      max-height: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .message-date {
      color: #6c757d;
      font-size: 0.875rem;
    }
    .search-container {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/favorites">Telegram收藏夹</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" href="/favorites">收藏</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/tags">标签</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/search">搜索</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/settings">设置</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" id="logout-link">退出</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container mt-4">
    <!-- 账户选择器 -->
    <div class="account-selector" id="account-selector-container" style="display: none;">
      <select class="form-select" id="account-selector">
        <option value="">选择Telegram账户</option>
      </select>
    </div>

    <!-- 搜索栏 -->
    <div class="search-container">
      <div class="input-group">
        <input type="text" class="form-control" id="search-input" placeholder="搜索收藏...">
        <button class="btn btn-outline-secondary" type="button" id="search-button">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">加载中...</span>
      </div>
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <i class="bi bi-bookmark-star"></i>
      <h3>暂无收藏</h3>
      <p>您还没有添加任何收藏，或者您需要先添加Telegram账户</p>
      <a href="/settings" class="btn btn-primary mt-3">添加账户</a>
    </div>

    <!-- 收藏列表 -->
    <div class="row" id="favorites-container" style="display: none;"></div>
  </div>

  <!-- 收藏项模板 -->
  <template id="favorite-template">
    <div class="col-md-6 col-lg-4">
      <div class="card favorite-item">
        <div class="card-body">
          <h5 class="card-title message-title"></h5>
          <p class="card-text message-content"></p>
          <div class="tags-container mb-2"></div>
          <div class="d-flex justify-content-between align-items-center">
            <small class="message-date"></small>
            <div class="btn-group">
              <a href="#" class="btn btn-sm btn-outline-secondary view-btn">查看</a>
              <button type="button" class="btn btn-sm btn-outline-danger delete-btn">删除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否已登录
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      const loadingElement = document.getElementById('loading');
      const emptyStateElement = document.getElementById('empty-state');
      const favoritesContainer = document.getElementById('favorites-container');
      const accountSelectorContainer = document.getElementById('account-selector-container');
      const accountSelector = document.getElementById('account-selector');
      const searchInput = document.getElementById('search-input');
      const searchButton = document.getElementById('search-button');
      const logoutLink = document.getElementById('logout-link');
      
      let favorites = [];
      let accounts = [];
      let activeAccountId = null;

      // 获取用户信息
      function fetchUserInfo() {
        return fetch('/api/users/me', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('获取用户信息失败');
          }
          return response.json();
        })
        .then(data => {
          return data;
        })
        .catch(error => {
          console.error('获取用户信息错误:', error);
          // 如果获取用户信息失败，可能是token无效，重定向到登录页
          localStorage.removeItem('token');
          window.location.href = '/login.html';
        });
      }

      // 获取Telegram账户
      function fetchTelegramAccounts() {
        return fetch('/api/users/accounts', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('获取Telegram账户失败');
          }
          return response.json();
        })
        .then(data => {
          accounts = data;
          
          // 如果有账户，显示账户选择器
          if (accounts.length > 0) {
            accountSelectorContainer.style.display = 'block';
            
            // 清空选择器
            while (accountSelector.options.length > 1) {
              accountSelector.remove(1);
            }
            
            // 添加账户选项
            accounts.forEach(account => {
              const option = document.createElement('option');
              option.value = account.id;
              option.textContent = account.name || `账户 ${account.id}`;
              if (account.isActive) {
                option.selected = true;
                activeAccountId = account.id;
              }
              accountSelector.appendChild(option);
            });
            
            // 如果没有活跃账户但有账户，选择第一个
            if (!activeAccountId && accounts.length > 0) {
              activeAccountId = accounts[0].id;
              accountSelector.value = activeAccountId;
            }
            
            // 获取收藏
            fetchFavorites(activeAccountId);
          } else {
            // 没有账户，显示空状态
            loadingElement.style.display = 'none';
            emptyStateElement.style.display = 'block';
          }
          
          return accounts;
        })
        .catch(error => {
          console.error('获取Telegram账户错误:', error);
          loadingElement.style.display = 'none';
          emptyStateElement.style.display = 'block';
        });
      }

      // 获取收藏
      function fetchFavorites(accountId) {
        if (!accountId) {
          loadingElement.style.display = 'none';
          emptyStateElement.style.display = 'block';
          return Promise.resolve([]);
        }
        
        loadingElement.style.display = 'flex';
        favoritesContainer.style.display = 'none';
        emptyStateElement.style.display = 'none';
        
        return fetch(`/api/favorites?accountId=${accountId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('获取收藏失败');
          }
          return response.json();
        })
        .then(data => {
          favorites = data;
          
          // 显示收藏
          renderFavorites(favorites);
          
          return favorites;
        })
        .catch(error => {
          console.error('获取收藏错误:', error);
          loadingElement.style.display = 'none';
          emptyStateElement.style.display = 'block';
        });
      }

      // 渲染收藏列表
      function renderFavorites(favoritesToRender) {
        loadingElement.style.display = 'none';
        
        // 清空容器
        favoritesContainer.innerHTML = '';
        
        if (favoritesToRender.length === 0) {
          emptyStateElement.style.display = 'block';
          return;
        }
        
        emptyStateElement.style.display = 'none';
        favoritesContainer.style.display = 'flex';
        
        const template = document.getElementById('favorite-template');
        
        favoritesToRender.forEach(favorite => {
          const clone = document.importNode(template.content, true);
          
          // 设置标题
          const titleElement = clone.querySelector('.message-title');
          titleElement.textContent = favorite.title || '未命名收藏';
          
          // 设置内容
          const contentElement = clone.querySelector('.message-content');
          contentElement.textContent = favorite.content || '';
          
          // 设置日期
          const dateElement = clone.querySelector('.message-date');
          const date = new Date(favorite.date);
          dateElement.textContent = date.toLocaleDateString();
          
          // 设置标签
          const tagsContainer = clone.querySelector('.tags-container');
          if (favorite.tags && favorite.tags.length > 0) {
            favorite.tags.forEach(tag => {
              const badge = document.createElement('span');
              badge.className = 'badge tag-badge';
              badge.textContent = tag.name;
              badge.addEventListener('click', () => {
                // 按标签筛选
                const filtered = favorites.filter(f => 
                  f.tags && f.tags.some(t => t.id === tag.id)
                );
                renderFavorites(filtered);
              });
              tagsContainer.appendChild(badge);
            });
          }
          
          // 设置查看按钮
          const viewButton = clone.querySelector('.view-btn');
          viewButton.href = `/favorites/${favorite.id}`;
          
          // 设置删除按钮
          const deleteButton = clone.querySelector('.delete-btn');
          deleteButton.addEventListener('click', () => {
            if (confirm('确定要删除这个收藏吗？')) {
              deleteFavorite(favorite.id);
            }
          });
          
          favoritesContainer.appendChild(clone);
        });
      }

      // 删除收藏
      function deleteFavorite(id) {
        fetch(`/api/favorites/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('删除收藏失败');
          }
          return response.json();
        })
        .then(() => {
          // 重新获取收藏
          fetchFavorites(activeAccountId);
        })
        .catch(error => {
          console.error('删除收藏错误:', error);
          alert('删除收藏失败，请重试');
        });
      }

      // 搜索收藏
      function searchFavorites() {
        const query = searchInput.value.trim().toLowerCase();
        
        if (!query) {
          renderFavorites(favorites);
          return;
        }
        
        const filtered = favorites.filter(favorite => 
          (favorite.title && favorite.title.toLowerCase().includes(query)) ||
          (favorite.content && favorite.content.toLowerCase().includes(query)) ||
          (favorite.tags && favorite.tags.some(tag => tag.name.toLowerCase().includes(query)))
        );
        
        renderFavorites(filtered);
      }

      // 退出登录
      function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
      }

      // 事件监听
      accountSelector.addEventListener('change', function() {
        activeAccountId = this.value;
        fetchFavorites(activeAccountId);
      });
      
      searchButton.addEventListener('click', searchFavorites);
      
      searchInput.addEventListener('keyup', function(event) {
        if (event.key === 'Enter') {
          searchFavorites();
        }
      });
      
      logoutLink.addEventListener('click', function(e) {
        e.preventDefault();
        logout();
      });

      // 初始化
      fetchUserInfo()
        .then(() => fetchTelegramAccounts());
    });
  </script>
</body>
</html>
