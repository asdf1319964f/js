<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Telegram收藏夹</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #f5f5f5;
      padding-top: 56px;
    }
    .navbar {
      background-color: #0088cc;
    }
    .navbar-brand, .nav-link {
      color: white !important;
    }
    .card {
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .account-card {
      border-left: 4px solid #0088cc;
    }
    .account-card.active {
      border-left: 4px solid #28a745;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
    }
    .spinner-border {
      width: 3rem;
      height: 3rem;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/favorites.html">Telegram收藏夹</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="/favorites.html">收藏</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/tags.html">标签</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/search.html">搜索</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="/settings.html">设置</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" id="logout-link">退出</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container mt-4">
    <h2 class="mb-4">账户设置</h2>
    
    <!-- 加载状态 -->
    <div class="loading" id="loading">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">加载中...</span>
      </div>
    </div>

    <!-- 添加Telegram账户卡片 -->
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="mb-0">添加Telegram账户</h5>
      </div>
      <div class="card-body">
        <form id="add-account-form">
          <div class="mb-3">
            <label for="account-name" class="form-label">账户名称</label>
            <input type="text" class="form-control" id="account-name" placeholder="例如：个人账户">
          </div>
          <div class="mb-3">
            <label for="api-id" class="form-label">API ID</label>
            <input type="text" class="form-control" id="api-id" required>
            <div class="form-text">从 <a href="https://my.telegram.org/apps" target="_blank">my.telegram.org/apps</a> 获取</div>
          </div>
          <div class="mb-3">
            <label for="api-hash" class="form-label">API Hash</label>
            <input type="text" class="form-control" id="api-hash" required>
          </div>
          <div class="mb-3">
            <label for="session-string" class="form-label">Session String</label>
            <textarea class="form-control" id="session-string" rows="3" required></textarea>
            <div class="form-text">使用Telegram客户端生成的会话字符串</div>
          </div>
          <button type="submit" class="btn btn-primary">添加账户</button>
        </form>
      </div>
    </div>

    <!-- Telegram账户列表 -->
    <h3 class="mb-3">已添加的账户</h3>
    <div id="accounts-container"></div>
  </div>

  <!-- 账户卡片模板 -->
  <template id="account-template">
    <div class="card account-card mb-3">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h5 class="card-title account-name mb-0"></h5>
          <div class="form-check form-switch">
            <input class="form-check-input active-switch" type="checkbox" role="switch">
            <label class="form-check-label">活跃</label>
          </div>
        </div>
        <p class="card-text account-details mt-2"></p>
        <div class="d-flex justify-content-end">
          <button type="button" class="btn btn-sm btn-outline-danger delete-btn">删除账户</button>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否已登录
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      const loadingElement = document.getElementById('loading');
      const accountsContainer = document.getElementById('accounts-container');
      const addAccountForm = document.getElementById('add-account-form');
      const accountNameInput = document.getElementById('account-name');
      const apiIdInput = document.getElementById('api-id');
      const apiHashInput = document.getElementById('api-hash');
      const sessionStringInput = document.getElementById('session-string');
      const logoutLink = document.getElementById('logout-link');
      
      let accounts = [];

      // 获取用户信息
      function fetchUserInfo() {
        return fetch('/api/users/me', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('获取用户信息失败');
          }
          return response.json();
        })
        .then(data => {
          return data;
        })
        .catch(error => {
          console.error('获取用户信息错误:', error);
          // 如果获取用户信息失败，可能是token无效，重定向到登录页
          localStorage.removeItem('token');
          window.location.href = '/login.html';
        });
      }

      // 获取Telegram账户
      function fetchTelegramAccounts() {
        loadingElement.style.display = 'flex';
        
        return fetch('/api/users/accounts', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('获取Telegram账户失败');
          }
          return response.json();
        })
        .then(data => {
          accounts = data;
          renderAccounts(accounts);
          return accounts;
        })
        .catch(error => {
          console.error('获取Telegram账户错误:', error);
          loadingElement.style.display = 'none';
          alert('获取Telegram账户失败，请重试');
        });
      }

      // 渲染账户列表
      function renderAccounts(accountsToRender) {
        loadingElement.style.display = 'none';
        
        // 清空容器
        accountsContainer.innerHTML = '';
        
        if (accountsToRender.length === 0) {
          accountsContainer.innerHTML = '<div class="alert alert-info">暂无账户，请添加一个Telegram账户</div>';
          return;
        }
        
        const template = document.getElementById('account-template');
        
        accountsToRender.forEach(account => {
          const clone = document.importNode(template.content, true);
          const card = clone.querySelector('.account-card');
          
          // 如果是活跃账户，添加active类
          if (account.isActive) {
            card.classList.add('active');
          }
          
          // 设置账户名
          const nameElement = clone.querySelector('.account-name');
          nameElement.textContent = account.name || `账户 ${account.id}`;
          
          // 设置账户详情
          const detailsElement = clone.querySelector('.account-details');
          detailsElement.textContent = `API ID: ${account.apiId}`;
          
          // 设置活跃开关
          const activeSwitch = clone.querySelector('.active-switch');
          activeSwitch.checked = account.isActive;
          activeSwitch.addEventListener('change', () => {
            setActiveAccount(account.id, activeSwitch.checked);
          });
          
          // 设置删除按钮
          const deleteButton = clone.querySelector('.delete-btn');
          deleteButton.addEventListener('click', () => {
            if (confirm('确定要删除这个账户吗？')) {
              deleteAccount(account.id);
            }
          });
          
          accountsContainer.appendChild(clone);
        });
      }

      // 添加账户
      function addAccount(accountData) {
        return fetch('/api/users/accounts', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(accountData)
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('添加账户失败');
          }
          return response.json();
        })
        .then(data => {
          // 重新获取账户
          fetchTelegramAccounts();
          return data;
        });
      }

      // 设置活跃账户
      function setActiveAccount(accountId, isActive) {
        return fetch(`/api/users/accounts/${accountId}/active`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ isActive })
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('设置活跃账户失败');
          }
          return response.json();
        })
        .then(data => {
          // 重新获取账户
          fetchTelegramAccounts();
          return data;
        });
      }

      // 删除账户
      function deleteAccount(accountId) {
        return fetch(`/api/users/accounts/${accountId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        })
        .then(response => {
          if (!response.ok) {
            throw new Error('删除账户失败');
          }
          return response.json();
        })
        .then(() => {
          // 重新获取账户
          fetchTelegramAccounts();
        });
      }

      // 退出登录
      function logout() {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
      }

      // 事件监听
      addAccountForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const accountData = {
          name: accountNameInput.value.trim(),
          apiId: apiIdInput.value.trim(),
          apiHash: apiHashInput.value.trim(),
          sessionString: sessionStringInput.value.trim()
        };
        
        if (!accountData.apiId || !accountData.apiHash || !accountData.sessionString) {
          alert('请填写必填字段');
          return;
        }
        
        addAccount(accountData)
          .then(() => {
            // 清空表单
            accountNameInput.value = '';
            apiIdInput.value = '';
            apiHashInput.value = '';
            sessionStringInput.value = '';
          })
          .catch(error => {
            console.error('添加账户错误:', error);
            alert('添加账户失败，请重试');
          });
      });
      
      logoutLink.addEventListener('click', function(e) {
        e.preventDefault();
        logout();
      });

      // 初始化
      fetchUserInfo()
        .then(() => fetchTelegramAccounts());
    });
  </script>
</body>
</html>
